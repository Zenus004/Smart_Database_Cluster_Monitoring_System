services:
  # ---------------------------------------
  # PostgreSQL Cluster (Master + 3 Replicas)
  # ---------------------------------------
  postgres-master:
    image: postgres:15-alpine
    container_name: postgres-master
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REPLICATOR_USER: ${REPLICATOR_USER}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - pg_master_data:/var/lib/postgresql/data
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./scripts/init-pg-master.sh:/docker-entrypoint-initdb.d/init.sh
    command: >
      postgres -c config_file=/etc/postgresql/postgresql.conf
             -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - db-cluster-net

  postgres-replica-1:
    image: postgres:15-alpine
    container_name: postgres-replica-1
    user: postgres
    restart: unless-stopped
    depends_on:
      - postgres-master
    environment:
      PGPASSWORD: ${REPLICATOR_PASSWORD}
      REPLICATOR_USER: ${REPLICATOR_USER}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - ./config/postgres/replica.conf:/etc/postgresql/postgresql.conf
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - pg_replica1_data:/var/lib/postgresql/data
    command: >
      bash -c "
      echo 'Waiting for valid connection as ${REPLICATOR_USER}...' &&
      until PGPASSWORD='${REPLICATOR_PASSWORD}' psql -h postgres-master -U ${REPLICATOR_USER} -d postgres -c 'SELECT 1' > /dev/null 2>&1; do
        echo 'Master not ready or user not created yet. Retrying...'
        sleep 2
      done &&
      echo 'Master is ready! Starting base backup...' &&
      rm -rf /var/lib/postgresql/data/* &&
      pg_basebackup -h postgres-master -D /var/lib/postgresql/data -U ${REPLICATOR_USER} -v -P -X stream -R &&
      chown -R postgres:postgres /var/lib/postgresql/data &&
      chmod 700 /var/lib/postgresql/data &&
      postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf"
    ports:
      - "5435:5432"
    networks:
      - db-cluster-net

  postgres-replica-2:
    image: postgres:15-alpine
    container_name: postgres-replica-2
    user: postgres
    restart: unless-stopped
    depends_on:
      - postgres-master
    environment:
      PGPASSWORD: ${REPLICATOR_PASSWORD}
      REPLICATOR_USER: ${REPLICATOR_USER}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - ./config/postgres/replica.conf:/etc/postgresql/postgresql.conf
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - pg_replica2_data:/var/lib/postgresql/data
    command: >
      bash -c "
      echo 'Waiting for valid connection as ${REPLICATOR_USER}...' &&
      until PGPASSWORD='${REPLICATOR_PASSWORD}' psql -h postgres-master -U ${REPLICATOR_USER} -d postgres -c 'SELECT 1' > /dev/null 2>&1; do
        echo 'Master not ready or user not created yet. Retrying...'
        sleep 2
      done &&
      echo 'Master is ready! Starting base backup...' &&
      rm -rf /var/lib/postgresql/data/* &&
      pg_basebackup -h postgres-master -D /var/lib/postgresql/data -U ${REPLICATOR_USER} -v -P -X stream -R &&
      chown -R postgres:postgres /var/lib/postgresql/data &&
      chmod 700 /var/lib/postgresql/data &&
      postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf"
    ports:
      - "5436:5432"
    networks:
      - db-cluster-net
  
  postgres-replica-3:
    image: postgres:15-alpine
    container_name: postgres-replica-3
    user: postgres
    restart: unless-stopped
    depends_on:
      - postgres-master
    environment:
      PGPASSWORD: ${REPLICATOR_PASSWORD}
      REPLICATOR_USER: ${REPLICATOR_USER}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - ./config/postgres/replica.conf:/etc/postgresql/postgresql.conf
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - pg_replica3_data:/var/lib/postgresql/data
    command: >
      bash -c "
      echo 'Waiting for valid connection as ${REPLICATOR_USER}...' &&
      until PGPASSWORD='${REPLICATOR_PASSWORD}' psql -h postgres-master -U ${REPLICATOR_USER} -d postgres -c 'SELECT 1' > /dev/null 2>&1; do
        echo 'Master not ready or user not created yet. Retrying...'
        sleep 2
      done &&
      echo 'Master is ready! Starting base backup...' &&
      rm -rf /var/lib/postgresql/data/* &&
      pg_basebackup -h postgres-master -D /var/lib/postgresql/data -U ${REPLICATOR_USER} -v -P -X stream -R &&
      chown -R postgres:postgres /var/lib/postgresql/data &&
      chmod 700 /var/lib/postgresql/data &&
      postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf"
    ports:
      - "5437:5432"
    networks:
      - db-cluster-net

  # ---------------------------------------
  # MySQL Cluster (Master + 3 Slaves)
  # ---------------------------------------
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      REPLICATOR_USER: ${REPLICATOR_USER}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./scripts/init-mysql-master.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      mysqld
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=row
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    ports:
      - "${MYSQL_PORT}:3306"
    networks:
      - db-cluster-net

  mysql-slave-1:
    image: mysql:8.0
    container_name: mysql-slave-1
    restart: unless-stopped
    depends_on:
      - mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      REPLICATOR_USER: ${REPLICATOR_USER}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - mysql_slave1_data:/var/lib/mysql
      - ./scripts/init-mysql-slave.sh:/docker-entrypoint-initdb.d/init.sh
    command: >
      mysqld
      --server-id=2
      --relay-log=mysql-relay-bin
      --log-bin=mysql-bin
      --binlog-format=row
      --read-only=1
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    ports:
      - "3309:3306"
    networks:
      - db-cluster-net

  mysql-slave-2:
    image: mysql:8.0
    container_name: mysql-slave-2
    restart: unless-stopped
    depends_on:
      - mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      REPLICATOR_USER: ${REPLICATOR_USER}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - mysql_slave2_data:/var/lib/mysql
      - ./scripts/init-mysql-slave.sh:/docker-entrypoint-initdb.d/init.sh
    command: >
      mysqld
      --server-id=3
      --relay-log=mysql-relay-bin
      --log-bin=mysql-bin
      --binlog-format=row
      --read-only=1
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    ports:
      - "3310:3306"
    networks:
      - db-cluster-net
  
  mysql-slave-3:
    image: mysql:8.0
    container_name: mysql-slave-3
    restart: unless-stopped
    depends_on:
      - mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      REPLICATOR_USER: ${REPLICATOR_USER}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - mysql_slave3_data:/var/lib/mysql
      - ./scripts/init-mysql-slave.sh:/docker-entrypoint-initdb.d/init.sh
    command: >
      mysqld
      --server-id=4
      --relay-log=mysql-relay-bin
      --log-bin=mysql-bin
      --binlog-format=row
      --read-only=1
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    ports:
      - "3311:3306"
    networks:
      - db-cluster-net

  # ---------------------------------------
  # Backend API
  # ---------------------------------------


  backend:
    build: ./backend
    container_name: monitoring-backend
    restart: unless-stopped
    environment:
      - RUNNING_IN_DOCKER=true
      - CHECK_INTERVAL=5000
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/project
    ports:
      - "${BACKEND_PORT}:4000"
    depends_on:
      - postgres-master
      - mysql-master
    networks:
      - db-cluster-net

networks:
  db-cluster-net:
    driver: bridge

volumes:
  pg_master_data:
  pg_replica1_data:
  pg_replica2_data:
  pg_replica3_data:
  mysql_master_data:
  mysql_slave1_data:
  mysql_slave2_data:
  mysql_slave3_data: